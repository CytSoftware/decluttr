<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <!-- White/light version for dark backgrounds -->

  <!-- Paper stack (bottom to top, 5 layers) -->
  <rect x="115" y="225" width="170" height="12" rx="3" fill="#FFFFFF" opacity="0.45"/>
  <rect x="110" y="210" width="180" height="14" rx="3" fill="#FFFFFF" opacity="0.55"/>
  <rect x="105" y="193" width="190" height="16" rx="4" fill="#FFFFFF" opacity="0.65"/>
  <rect x="100" y="174" width="200" height="18" rx="4" fill="#FFFFFF" opacity="0.75"/>
  <rect x="95" y="153" width="210" height="20" rx="4" fill="#FFFFFF" opacity="0.88"/>

  <!-- Top document (rotated) -->
  <g transform="translate(200, 140) rotate(-12) translate(-200, -140)">
    <rect x="105" y="75" width="170" height="120" rx="8" fill="none" stroke="#FFFFFF" stroke-width="5"/>
    <rect x="108" y="78" width="164" height="8" rx="3" fill="#30B8B0"/>
    <line x1="125" y1="105" x2="255" y2="105" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <line x1="125" y1="120" x2="245" y2="120" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <line x1="125" y1="135" x2="230" y2="135" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <line x1="125" y1="150" x2="250" y2="150" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Motion lines -->
  <line x1="68" y1="115" x2="100" y2="115" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="55" y1="130" x2="95" y2="130" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="62" y1="145" x2="90" y2="145" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>

  <!-- Wordmark -->
  <text x="200" y="330" text-anchor="middle" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="700" fill="#FFFFFF" letter-spacing="-1">
    <tspan fill="#30B8B0">D</tspan>ecluttr
  </text>
</svg>
