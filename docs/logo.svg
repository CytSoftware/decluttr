<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <defs>
    <linearGradient id="stackGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5898C0"/>
      <stop offset="100%" stop-color="#1E5C8A"/>
    </linearGradient>
    <linearGradient id="topDocGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#30B8B0"/>
      <stop offset="100%" stop-color="#2DA8A0"/>
    </linearGradient>
    <linearGradient id="flyGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8F4F8"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>

  <!-- Paper stack (bottom to top, 5 layers) -->
  <!-- Layer 5 (bottom) -->
  <rect x="115" y="225" width="170" height="12" rx="3" fill="#1E5C8A" opacity="0.85"/>
  <!-- Layer 4 -->
  <rect x="110" y="210" width="180" height="14" rx="3" fill="#20608C" opacity="0.88"/>
  <!-- Layer 3 -->
  <rect x="105" y="193" width="190" height="16" rx="4" fill="#2872A0" opacity="0.9"/>
  <!-- Layer 2 -->
  <rect x="100" y="174" width="200" height="18" rx="4" fill="#3888B8" opacity="0.92"/>
  <!-- Layer 1 (top of stack) -->
  <rect x="95" y="153" width="210" height="20" rx="4" fill="#5898C0" opacity="0.95"/>

  <!-- Top document (teal-bordered, slightly rotated/lifted) -->
  <g transform="translate(200, 140) rotate(-12) translate(-200, -140)">
    <rect x="105" y="75" width="170" height="120" rx="8" fill="#FFFFFF" stroke="#1E5C8A" stroke-width="5"/>
    <!-- Teal accent top edge -->
    <rect x="108" y="78" width="164" height="8" rx="3" fill="#30B8B0"/>
    <!-- Document lines -->
    <line x1="125" y1="105" x2="255" y2="105" stroke="#C8DDE8" stroke-width="3" stroke-linecap="round"/>
    <line x1="125" y1="120" x2="245" y2="120" stroke="#C8DDE8" stroke-width="3" stroke-linecap="round"/>
    <line x1="125" y1="135" x2="230" y2="135" stroke="#C8DDE8" stroke-width="3" stroke-linecap="round"/>
    <line x1="125" y1="150" x2="250" y2="150" stroke="#C8DDE8" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Motion/speed lines -->
  <line x1="68" y1="115" x2="100" y2="115" stroke="#1E5C8A" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="55" y1="130" x2="95" y2="130" stroke="#1E5C8A" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="62" y1="145" x2="90" y2="145" stroke="#1E5C8A" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Wordmark "Decluttr" -->
  <text x="200" y="330" text-anchor="middle" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="700" fill="#1E5C8A" letter-spacing="-1">
    <tspan fill="#30B8B0">D</tspan>ecluttr
  </text>
</svg>
